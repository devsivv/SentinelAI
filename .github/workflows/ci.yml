# Minimal CI — runs the lightweight smoke tests on every push, per
# SYSTEM_RULES.md §6. Full CI/CD (deploy pipelines, cloud targets) is
# Future scope — see docs/deployment.md and MASTER_PLAN.md Phase 11.
name: smoke-tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/orchestrator/requirements.txt || true
      - run: pip install pytest
      - run: pytest tests/ -v
