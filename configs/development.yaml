# development.yaml — local dev configuration (the default)
environment: development

database:
  host: localhost
  port: 5432
  name: sentinelai_dev
  user: sentinelai
  # password comes from .env, never hardcoded here

neo4j:
  enabled: false        # set true only if Phase 7 (Graph Agent) is being built
  uri: bolt://localhost:7687
  user: neo4j

orchestrator:
  host: 0.0.0.0
  port: 8000
  timeout_seconds: 10    # per-agent timeout before Orchestrator degrades gracefully

logging:
  level: DEBUG
  dir: logs/

app:
  name: SentinelAI
  version: 0.1.0